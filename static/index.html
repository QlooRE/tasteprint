<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tasteprint</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --surface2: #21262d;
  --border:   #30363d;
  --border2:  #21262d;
  --text:     #c9d1d9;
  --text2:    #8b949e;
  --blue:     #58a6ff;
  --green:    #3fb950;
  --cyan:     #22d3ee;
  --purple:   #a78bfa;
  --red:      #f85149;
  --orange:   #f97316;
  --yellow:   #fbbf24;
  --r:        6px;
  --fnb:     #f97316;
  --music:   #a78bfa;
  --fashion: #22d3ee;
  --movies:  #58a6ff;
  --tv:      #3fb950;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

.wrap { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

/* ── Header ── */
#hdr {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 0;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.5);
}
.hdr-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
.hdr-top h1 { font-size: 17px; font-weight: 700; letter-spacing: -.3px; color: #e6edf3; }
.hdr-top h1 span { color: var(--purple); }
.hdr-top small { font-size: 12px; color: var(--text2); }

.controls { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
.cg { display: flex; flex-direction: column; gap: 5px; }
.cg label { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--text2); font-weight: 600; }

input[type="text"] {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r); color: var(--text);
  padding: 6px 10px; font-size: 13px; outline: none;
  transition: border-color .15s;
}
input[type="text"]:focus { border-color: var(--blue); }
input[type="text"] { width: 200px; }
.irow { display: flex; gap: 6px; align-items: center; }

/* audience input */
.audience-input {
  width: 380px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r); color: var(--text);
  padding: 7px 12px; font-size: 13px; outline: none;
  transition: border-color .15s;
}
.audience-input:focus { border-color: var(--purple); }

/* city chips */
.chip-row { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; max-width: 420px; }
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; cursor: pointer;
  font-size: 12px; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); user-select: none; transition: all .2s;
}
.chip-confirming { border-color: var(--border); color: var(--text2); }
.chip-ok   { background: rgba(63,185,80,.12); border-color: var(--green); color: var(--green); }
.chip-fail { background: rgba(248,81,73,.1);  border-color: var(--red);   color: var(--red); }
.chip-remove { font-size: 10px; opacity: .6; margin-left: 2px; cursor: pointer; }
.chip-remove:hover { opacity: 1; }
.chip-fnb.on     { background: rgba(249,115,22,.12); border-color: var(--fnb);     color: var(--fnb); }
.chip-music.on   { background: rgba(167,139,250,.12); border-color: var(--music);   color: var(--music); }
.chip-fashion.on { background: rgba(34,211,238,.12);  border-color: var(--fashion); color: var(--fashion); }
.chip-movies.on  { background: rgba(88,166,255,.12);  border-color: var(--movies);  color: var(--movies); }
.chip-tv.on      { background: rgba(63,185,80,.12);   border-color: var(--tv);      color: var(--tv); }
.chip-off { background: var(--surface2); border-color: var(--border); color: var(--text2); }

/* buttons */
.btn {
  padding: 6px 16px; border-radius: var(--r); border: 1px solid transparent;
  cursor: pointer; font-size: 13px; font-weight: 500;
  transition: background .15s, opacity .15s; white-space: nowrap;
}
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-primary { background: #1f6feb; color: #fff; border-color: #388bfd; }
.btn-primary:hover:not(:disabled) { background: #388bfd; }
.btn-ghost { background: var(--surface2); color: var(--text); border-color: var(--border); }
.btn-ghost:hover:not(:disabled) { border-color: var(--text2); }
.btn-pdf {
  background: linear-gradient(135deg, #0D2B5E, #2354E6);
  color: #fff; border-color: #2354E6;
}
.btn-pdf:hover:not(:disabled) { opacity: .85; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spin {
  display: inline-block; width: 11px; height: 11px;
  border: 2px solid currentColor; border-top-color: transparent;
  border-radius: 50%; animation: spin .7s linear infinite;
  vertical-align: middle;
}

/* ── Audience banner ── */
#audience-banner {
  display: none; margin: 14px 0 0;
  padding: 10px 16px;
  background: rgba(167,139,250,.08); border: 1px solid rgba(167,139,250,.25);
  border-radius: var(--r); font-size: 13px;
}
.ab-label { font-weight: 600; color: var(--purple); margin-right: 10px; }
.ab-resolved { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.ab-entity {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: rgba(167,139,250,.12); border: 1px solid rgba(167,139,250,.3);
  color: var(--purple);
}

/* ── Status bar ── */
#status-bar { padding: 8px 0; border-bottom: 1px solid var(--border2); display: none; }
.pills { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
.slabel { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--text2); margin-right: 2px; }
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500;
  border: 1px solid transparent; transition: all .3s;
}
.pill-pending { background: var(--surface2); border-color: var(--border); color: var(--text2); }
.pill-loading { background: rgba(88,166,255,.1); border-color: var(--blue); color: var(--blue); }
.pill-done    { background: rgba(63,185,80,.1);  border-color: var(--green); color: var(--green); }
.pill-error   { background: rgba(248,81,73,.1);  border-color: var(--red);   color: var(--red); }

/* ── Top-level tabs ── */
#main { padding: 20px 0 60px; }

.top-tab-bar {
  display: none;
  gap: 0; border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.top-tab-btn {
  padding: 9px 22px; border: none; background: none; cursor: pointer;
  font-size: 14px; font-weight: 600; color: var(--text2);
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .15s, border-color .15s;
}
.top-tab-btn:hover { color: var(--text); }
.top-tab-btn.active { color: #e6edf3; border-bottom-color: var(--purple); }
.top-tab-pane { display: none; }
.top-tab-pane.active { display: block; }

/* ── City sub-tabs ── */
.tab-bar {
  display: flex; gap: 2px; border-bottom: 1px solid var(--border);
  margin-bottom: 20px; overflow-x: auto;
}
.tab-btn {
  padding: 7px 18px; border: none; background: none; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--text2);
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .15s, border-color .15s; white-space: nowrap;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: #e6edf3; border-bottom-color: var(--blue); }
.tab-btn.compare-tab.active { border-bottom-color: var(--cyan); color: var(--cyan); }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* ── Domain grid ── */
.domain-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
}
.domain-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
}
.domain-card-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-bottom: 1px solid var(--border2);
}
.domain-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.domain-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; }

/* skeleton */
.skeleton-row { padding: 10px 14px; border-bottom: 1px solid var(--border2); }
.skel { background: var(--surface2); border-radius: 3px; height: 10px; }
.skel-wide { width: 70%; margin-bottom: 5px; }
.skel-narrow { width: 40%; }
@keyframes shimmer { 0%,100%{opacity:.4} 50%{opacity:.7} }
.skeleton-row .skel { animation: shimmer 1.4s ease infinite; }

/* result rows */
.result-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 14px; border-bottom: 1px solid var(--border2);
  transition: background .1s;
}
.result-row:last-child { border-bottom: none; }
.result-row:hover { background: var(--surface2); }
.result-rank { font-size: 10px; color: var(--text2); width: 16px; flex-shrink: 0; padding-top: 1px; }
.result-body { flex: 1; min-width: 0; }
.result-name { font-weight: 600; font-size: 13px; color: #e6edf3; }
.result-desc { font-size: 11px; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.result-tag  { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
.aff-bar { width: 44px; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; padding-top: 3px; }
.aff-num { font-size: 10px; color: var(--text2); font-variant-numeric: tabular-nums; }
.aff-track { width: 100%; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.aff-fill  { height: 100%; border-radius: 2px; transition: width .6s ease; }

.d-fnb     { color: var(--fnb);     } .fill-fnb     { background: var(--fnb); }
.d-music   { color: var(--music);   } .fill-music   { background: var(--music); }
.d-fashion { color: var(--fashion); } .fill-fashion { background: var(--fashion); }
.d-movies  { color: var(--movies);  } .fill-movies  { background: var(--movies); }
.d-tv      { color: var(--tv);      } .fill-tv      { background: var(--tv); }

/* ── Persona cards ── */
.persona-card {
  background: var(--surface);
  border: 1px solid rgba(167,139,250,.35);
  border-radius: var(--r); overflow: hidden;
}
.persona-hdr {
  padding: 12px 18px;
  background: linear-gradient(135deg, rgba(167,139,250,.14) 0%, rgba(88,166,255,.06) 100%);
  border-bottom: 1px solid rgba(167,139,250,.2);
  display: flex; align-items: baseline; gap: 10px;
}
.persona-label { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: var(--purple); font-weight: 700; }
.persona-city  { font-size: 12px; color: var(--text2); }
.persona-archetype { padding: 14px 18px 4px; font-size: 20px; font-weight: 700; color: #e6edf3; letter-spacing: -.3px; }
.persona-narrative { padding: 5px 18px 14px; font-size: 13px; color: var(--text); line-height: 1.7; }
.persona-body { padding: 0 18px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 680px) { .persona-body { grid-template-columns: 1fr; } }
.persona-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: .7px; color: var(--text2); font-weight: 700; margin-bottom: 8px; }
.cd-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.cd-list li { font-size: 12px; color: var(--text); padding-left: 14px; position: relative; line-height: 1.5; }
.cd-list li::before { content: "→"; position: absolute; left: 0; color: var(--purple); font-size: 10px; top: 2px; }
.persona-distinction {
  padding: 10px 14px;
  background: rgba(251,191,36,.06); border-left: 2px solid var(--yellow);
  border-radius: 0 var(--r) var(--r) 0;
  font-size: 12px; color: var(--text); font-style: italic; line-height: 1.6;
}
.personas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 16px; }
@media (max-width: 560px) { .personas-grid { grid-template-columns: 1fr; } }

/* ── Compare ── */
.compare-grid { display: flex; flex-direction: column; gap: 20px; }
.compare-domain-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.compare-domain-hdr { padding: 9px 14px; display: flex; align-items: center; gap: 8px; background: var(--surface2); border-bottom: 1px solid var(--border2); }
.compare-domain-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; }
.compare-cols { display: grid; }
.compare-col-hdr { padding: 7px 12px; font-size: 11px; font-weight: 600; color: var(--text2); border-bottom: 1px solid var(--border2); border-right: 1px solid var(--border2); background: var(--surface2); }
.compare-item { display: flex; align-items: center; gap: 7px; padding: 6px 12px; border-bottom: 1px solid var(--border2); border-right: 1px solid var(--border2); font-size: 12px; }
.compare-item:last-child { border-bottom: none; }
.compare-item.shared { background: rgba(251,191,36,.05); }
.shared-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--yellow); flex-shrink: 0; }
.uniq-dot   { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.compare-name { flex: 1; font-weight: 500; color: #e6edf3; }
.compare-tags { font-size: 10px; color: var(--text2); }
.shared-legend { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); padding: 7px 12px; border-top: 1px solid var(--border2); }

.empty { padding: 32px; text-align: center; color: var(--text2); font-size: 13px; }
.loading-msg { padding: 24px; color: var(--text2); font-size: 13px; display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>

<!-- ── Header ── -->
<header id="hdr">
  <div class="wrap">
    <div class="hdr-top">
      <h1>Taste<span>print</span></h1>
      <small>audience taste intelligence · Qloo® + Claude</small>
    </div>
    <div class="controls">

      <div class="cg" style="flex:1;min-width:320px">
        <label>Audience <span style="font-weight:400;color:var(--text2)">(describe naturally)</span></label>
        <input class="audience-input" id="audience" placeholder="e.g. 30-34 year old men who love Wendy's and streetwear" style="width:100%">
      </div>

      <div class="cg">
        <label>Cities</label>
        <div class="irow">
          <input type="text" id="city-input" placeholder="Type a city + Enter" style="width:190px"
                 onkeydown="if(event.key==='Enter')addCity()" oninput="onCityInput(this.value)">
          <button class="btn btn-ghost btn-sm" onclick="addCity()">Add</button>
        </div>
        <div class="chip-row" id="city-chips" style="margin-top:6px"></div>
        <div id="city-suggest" style="font-size:11px;color:var(--text2);margin-top:3px;min-height:14px"></div>
      </div>

      <div class="cg">
        <label>Domains</label>
        <div class="chip-row" id="domain-chips"></div>
      </div>

      <div class="cg">
        <label>&nbsp;</label>
        <div class="irow" style="gap:8px">
          <button class="btn btn-primary" id="run-btn" onclick="startRun()">Gather Insights</button>
          <button class="btn btn-pdf btn-sm" id="export-pdf-btn" onclick="generatePDF()" style="display:none">↓ Export PDF</button>
        </div>
      </div>

    </div>

    <!-- Audience resolved banner (inside header) -->
    <div id="audience-banner"></div>
  </div>
</header>

<div class="wrap">

  <!-- Status bar -->
  <div id="status-bar"><div class="pills" id="pills"></div></div>

  <!-- Main -->
  <div id="main">

    <!-- Top-level tabs -->
    <div class="top-tab-bar" id="top-tab-bar">
      <button class="top-tab-btn active" data-top="tastes"   onclick="activateTopTab('tastes')">Tastes</button>
      <button class="top-tab-btn"        data-top="personas" onclick="activateTopTab('personas')">Personas</button>
    </div>

    <!-- Tastes pane -->
    <div class="top-tab-pane active" id="top-pane-tastes">
      <div id="tab-bar"   class="tab-bar"   style="display:none"></div>
      <div id="tab-panes"></div>
    </div>

    <!-- Personas pane -->
    <div class="top-tab-pane" id="top-pane-personas">
      <div id="personas-loading" style="display:none" class="loading-msg">
        <span class="spin" style="color:var(--purple)"></span> Writing persona profiles with Claude…
      </div>
      <div id="personas-grid" class="personas-grid"></div>
      <div id="personas-empty" class="empty" style="display:none">Personas will appear here after the run completes.</div>
    </div>

  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const DOMAIN_META = {
  fnb:     { label: "Food & Beverage", cls: "fnb" },
  music:   { label: "Music",           cls: "music" },
  fashion: { label: "Fashion & Brands",cls: "fashion" },
  movies:  { label: "Movies",          cls: "movies" },
  tv:      { label: "TV",              cls: "tv" },
};

// ── State ──────────────────────────────────────────────────────────────────
let sse         = null;
let _cities     = [];
let _activeDoms = new Set(Object.keys(DOMAIN_META));
let _allResults = {};
let _suggestTimer = null;

// Report data accumulated during a run
let _report = {
  audience: "", audienceParsed: null,
  cities: [], domains: [],
  results: {}, personas: {},
  generatedAt: null,
};

// ── Domain chips ───────────────────────────────────────────────────────────
function initDomainChips() {
  const c = document.getElementById("domain-chips");
  Object.entries(DOMAIN_META).forEach(([key, meta]) => {
    const el = document.createElement("span");
    el.className = `chip chip-${meta.cls} on`;
    el.dataset.key = key;
    el.textContent = meta.label;
    el.addEventListener("click", () => {
      const on = el.classList.toggle("on");
      el.classList.toggle("chip-off", !on);
      if (on) _activeDoms.add(key); else _activeDoms.delete(key);
    });
    c.appendChild(el);
  });
}

// ── City management ────────────────────────────────────────────────────────
let _suggestResult = null;

function onCityInput(val) {
  clearTimeout(_suggestTimer);
  const sug = document.getElementById("city-suggest");
  if (!val.trim()) { sug.textContent = ""; _suggestResult = null; return; }
  sug.innerHTML = `<span class="spin" style="color:var(--text2)"></span>`;
  _suggestTimer = setTimeout(() => confirmLocality(val.trim()), 400);
}

async function confirmLocality(q) {
  const sug = document.getElementById("city-suggest");
  try {
    const r = await fetch(`/locality-search?q=${encodeURIComponent(q)}`).then(r => r.json());
    _suggestResult = r;
    if (r.found) {
      sug.innerHTML = `<span style="color:var(--green)">✓ ${esc(r.name)}</span>${r.disambiguation ? ` <span style="color:var(--text2)">· ${esc(r.disambiguation.substring(0,60))}</span>` : ""}`;
    } else {
      sug.innerHTML = `<span style="color:var(--red)">✗ Not found in Qloo</span>`;
      _suggestResult = null;
    }
  } catch {
    sug.textContent = "";
    _suggestResult = null;
  }
}

function addCity() {
  const inp = document.getElementById("city-input");
  const raw = inp.value.trim();
  if (!raw) return;
  const name = (_suggestResult && _suggestResult.found) ? _suggestResult.name : raw;
  if (_cities.find(c => c.name.toLowerCase() === name.toLowerCase())) {
    inp.value = ""; document.getElementById("city-suggest").textContent = ""; return;
  }
  const status = (_suggestResult && _suggestResult.found) ? "ok" : "unconfirmed";
  _cities.push({ name, status });
  renderCityChips();
  inp.value = "";
  document.getElementById("city-suggest").textContent = "";
  _suggestResult = null;
}

function removeCity(name) {
  _cities = _cities.filter(c => c.name !== name);
  renderCityChips();
}

function renderCityChips() {
  const c = document.getElementById("city-chips");
  c.innerHTML = "";
  _cities.forEach(({ name, status }) => {
    const el = document.createElement("span");
    el.className = `chip ${status === "ok" ? "chip-ok" : status === "unconfirmed" ? "chip-fail" : "chip-confirming"}`;
    el.title = status === "unconfirmed" ? "Could not confirm this city in Qloo — results may vary" : name;
    el.innerHTML = `${esc(name)} <span class="chip-remove" onclick="removeCity('${esc(name)}')">×</span>`;
    c.appendChild(el);
  });
}

// ── Top-level tab switching ────────────────────────────────────────────────
function activateTopTab(name) {
  document.querySelectorAll(".top-tab-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.top === name));
  document.querySelectorAll(".top-tab-pane").forEach(p =>
    p.classList.toggle("active", p.id === `top-pane-${name}`));
}

// ── Status pills ───────────────────────────────────────────────────────────
function initPills(cities, domains) {
  const c = document.getElementById("pills");
  c.innerHTML = '<span class="slabel">Loading</span>';
  cities.forEach(city => {
    domains.forEach(dom => {
      const el = document.createElement("span");
      el.className = "pill pill-loading";
      el.id = `pill-${slugify(city)}-${dom}`;
      el.innerHTML = `<span class="spin"></span> ${city} · ${DOMAIN_META[dom].label}`;
      c.appendChild(el);
    });
  });
  const cp = document.createElement("span");
  cp.className = "pill pill-pending"; cp.id = "pill-claude";
  cp.textContent = "Personas";
  c.appendChild(cp);
  document.getElementById("status-bar").style.display = "";
}

function setPill(id, state, label) {
  const el = document.getElementById(`pill-${id}`);
  if (!el) return;
  el.className = `pill pill-${state}`;

// ── City sub-tabs ──────────────────────────────────────────────────────────
function slugify(s) { return s.replace(/\s+/g, "_").replace(/[^a-zA-Z0-9_]/g, ""); }

function buildCityTabs(cities, domains) {
  const bar   = document.getElementById("tab-bar");
  const panes = document.getElementById("tab-panes");
  bar.innerHTML = ""; panes.innerHTML = "";
  bar.style.display = "";

  cities.forEach((city, i) => {
    const slug = slugify(city);
    const btn  = document.createElement("button");
    btn.className = `tab-btn${i === 0 ? " active" : ""}`;
    btn.dataset.city = slug;
    btn.textContent  = city;
    btn.addEventListener("click", () => activateCityTab(slug));
    bar.appendChild(btn);

    const pane = document.createElement("div");
    pane.className = `tab-pane${i === 0 ? " active" : ""}`;
    pane.id = `pane-${slug}`;

    const grid = document.createElement("div");
    grid.className = "domain-grid";
    grid.id = `grid-${slug}`;

    domains.forEach(dom => {
      const meta = DOMAIN_META[dom];
      const card = document.createElement("div");
      card.className = "domain-card";
      card.id = `dc-${slug}-${dom}`;
      card.innerHTML = `
        <div class="domain-card-hdr">
          <div class="domain-dot" style="background:var(--${meta.cls})"></div>
          <span class="domain-title d-${meta.cls}">${meta.label}</span>
        </div>
        <div id="db-${slug}-${dom}">${skeletonRows(4)}</div>`;
      grid.appendChild(card);
    });

    pane.appendChild(grid);
    panes.appendChild(pane);
  });

  // Compare sub-tab
  const compBtn = document.createElement("button");
  compBtn.className = "tab-btn compare-tab";
  compBtn.id = "tab-compare-btn";
  compBtn.textContent = "Compare ↗";
  compBtn.disabled = true;
  compBtn.addEventListener("click", () => activateCityTab("compare"));
  bar.appendChild(compBtn);

  const compPane = document.createElement("div");
  compPane.className = "tab-pane";
  compPane.id = "pane-compare";
  compPane.innerHTML = '<div class="empty">Run a fetch to compare cities</div>';
  panes.appendChild(compPane);
}

function activateCityTab(slug) {
  document.querySelectorAll("#tab-bar .tab-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.city === slug));
  document.querySelectorAll("#tab-panes .tab-pane").forEach(p =>
    p.classList.toggle("active", p.id === `pane-${slug}`));
}

function skeletonRows(n) {
  return Array.from({length: n}, () =>
    `<div class="skeleton-row"><div class="skel skel-wide"></div><div class="skel skel-narrow"></div></div>`
  ).join("");
}

// ── Domain results ─────────────────────────────────────────────────────────
function renderDomainResults(city, domain, results, error) {
  const body = document.getElementById(`db-${slugify(city)}-${domain}`);
  if (!body) return;
  const meta = DOMAIN_META[domain];

  if (error) {
    body.innerHTML = `<div style="padding:12px 14px;font-size:12px;color:var(--red)">${esc(error)}</div>`;
    return;
  }
  if (!results || !results.length) {
    body.innerHTML = `<div class="empty">No results</div>`;
    return;
  }

  const maxAff = Math.max(...results.map(r => r.affinity), 0.0001);
  body.innerHTML = results.map((r, i) => {
    const pct  = Math.round((r.affinity / maxAff) * 100);
    const tags = (r.tags || []).map(t => `<span class="result-tag">${esc(t)}</span>`).join("");
    const desc = r.description ? `<div class="result-desc">${esc(r.description)}</div>` : "";
    return `<div class="result-row">
      <div class="result-rank">${i + 1}</div>
      <div class="result-body">
        <div class="result-name">${esc(r.name)}</div>
        ${desc}
        ${tags ? `<div class="result-tags">${tags}</div>` : ""}
      </div>
      <div class="aff-bar">
        <div class="aff-num">${Math.round(r.affinity * 100)}%</div>
        <div class="aff-track"><div class="aff-fill fill-${meta.cls}" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join("");
}

// ── Compare tab ────────────────────────────────────────────────────────────
function buildCompareTab(cities, domains) {
  const pane = document.getElementById("pane-compare");
  if (!pane) return;

  const grid = document.createElement("div");
  grid.className = "compare-grid";

  domains.forEach(domain => {
    const meta = DOMAIN_META[domain];
    const cityNames = {};
    cities.forEach(c => {
      cityNames[c] = ((_allResults[c] || {})[domain] || []).map(r => r.name);
    });
    const nameCount = {};
    Object.values(cityNames).forEach(names =>
      names.forEach(n => nameCount[n] = (nameCount[n] || 0) + 1));
    const shared = new Set(Object.entries(nameCount).filter(([,c]) => c >= 2).map(([n]) => n));

    const section = document.createElement("div");
    section.className = "compare-domain-section";
    section.innerHTML = `<div class="compare-domain-hdr">
      <div class="domain-dot" style="background:var(--${meta.cls})"></div>
      <span class="compare-domain-title d-${meta.cls}">${meta.label}</span>
    </div>`;

    const colsWrap = document.createElement("div");
    colsWrap.className = "compare-cols";
    colsWrap.style.gridTemplateColumns = `repeat(${cities.length}, 1fr)`;
    colsWrap.style.display = "grid";

    cities.forEach(city => {
      const h = document.createElement("div");
      h.className = "compare-col-hdr";
      h.textContent = city;
      colsWrap.appendChild(h);
    });

    const maxRows = Math.min(Math.max(...cities.map(c => (cityNames[c]||[]).length)), 6);
    for (let i = 0; i < maxRows; i++) {
      cities.forEach(city => {
        const name = (cityNames[city] || [])[i];
        const cell = document.createElement("div");
        cell.className = `compare-item${name && shared.has(name) ? " shared" : ""}`;
        if (name) {
          const r = ((_allResults[city]||{})[domain]||[])[i];
          const tags = (r?.tags||[]).slice(0,2).join(", ");
          cell.innerHTML = `<div class="${shared.has(name) ? "shared-dot" : "uniq-dot"}"></div>
            <span class="compare-name">${esc(name)}</span>
            ${tags ? `<span class="compare-tags">${esc(tags)}</span>` : ""}`;
        }
        colsWrap.appendChild(cell);
      });
    }
    section.appendChild(colsWrap);
    section.innerHTML += `<div class="shared-legend"><div class="shared-dot"></div> Shared across multiple markets</div>`;
    grid.appendChild(section);
  });

  pane.innerHTML = "";
  pane.appendChild(grid);
  const btn = document.getElementById("tab-compare-btn");
  if (btn) btn.disabled = false;
}

// ── Main fetch ─────────────────────────────────────────────────────────────
async function startRun() {
  if (sse) { sse.close(); sse = null; }
  if (!_cities.length) { alert("Add at least one city."); return; }
  if (!_activeDoms.size) { alert("Select at least one domain."); return; }

  clearAll();

  const cityNames = _cities.map(c => c.name);
  const domains   = [..._activeDoms];
  const audience  = document.getElementById("audience").value.trim();

  // Seed report data
  _report.audience = audience;
  _report.cities   = cityNames;
  _report.domains  = domains;

  document.getElementById("top-tab-bar").style.display = "flex";
  buildCityTabs(cityNames, domains);
  initPills(cityNames, domains);
  document.getElementById("personas-empty").style.display = "";

  const btn = document.getElementById("run-btn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spin"></span> Gathering…`;

  const { token } = await fetch("/session", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ qloo_key: "" }),
  }).then(r => r.json());

  const p = new URLSearchParams({ audience, cities: cityNames.join(","), domains: domains.join(","), token });
  sse = new EventSource(`/stream?${p}`);

  sse.addEventListener("audience_parsed", e => {
    const d = JSON.parse(e.data);
    _report.audienceParsed = d;
    showAudienceBanner(d);
  });

  sse.addEventListener("domain_done", e => {
    const d = JSON.parse(e.data);
    setPill(`${slugify(d.city)}-${d.domain}`, d.error ? "error" : "done",
      `${d.city} · ${d.domain_label} (${d.results?.length ?? 0})`);
    renderDomainResults(d.city, d.domain, d.results, d.error);
    if (!_allResults[d.city]) _allResults[d.city] = {};
    _allResults[d.city][d.domain] = d.results || [];
    if (!_report.results[d.city]) _report.results[d.city] = {};
    _report.results[d.city][d.domain] = d.results || [];
  });

  sse.addEventListener("persona_generating", () => {
    setPill("claude", "loading", "Writing personas…");
    document.getElementById("personas-empty").style.display = "none";
    document.getElementById("personas-loading").style.display = "flex";
    // No auto-switch — user stays on whichever tab they're on
  });

  sse.addEventListener("persona_done", e => {
    const d = JSON.parse(e.data);
    renderPersona(d.city, d);
    _report.personas[d.city] = {
      archetype: d.archetype, narrative: d.narrative,
      creative_direction: d.creative_direction, city_distinction: d.city_distinction,
    };
    setPill("claude", "done", "Personas ready");
  });

  sse.addEventListener("error", e => {
    try { console.warn("stream error:", JSON.parse(e.data)); } catch {}
  });

  sse.addEventListener("done", e => {
    _report.generatedAt = new Date();
    buildCompareTab(cityNames, domains);
    sse.close(); sse = null;
    btn.disabled = false; btn.innerHTML = "Gather Insights";
    document.getElementById("export-pdf-btn").style.display = "";
  });

  sse.onerror = () => {
    sse.close(); sse = null;
    btn.disabled = false; btn.innerHTML = "Gather Insights";
  };
}

  .taste-aff-num {
    font-size: 7pt;
    color: #9CA3AF;
    font-weight: 600;
  }

  /* ── Back cover ── */
  .pdf-back {
    background: linear-gradient(135deg, #0D2B5E 0%, #2354E6 50%, #7B2FBE 100%);

    align-items: center;
    justify-content: center;

  .back-inner { text-align: center; padding: 0 1in; }
  .back-logo {

}

function generatePDF() {
  const html = buildPDFHtml();
  const win  = window.open("", "_blank");
  if (!win) { alert("Please allow pop-ups to generate the PDF."); return; }
  win.document.write(html);
  win.document.close();
  win.focus();
  // Small delay so fonts/styles render before print dialog opens
  setTimeout(() => win.print(), 800);
}

// ── Init ───────────────────────────────────────────────────────────────────
initDomainChips();
</script>
</body>
